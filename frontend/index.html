<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BotJao - AI Chatbot Platform</title>

    <!-- DNS Prefetch for API (production) -->
    <link rel="dns-prefetch" href="https://api.botjao.com">
    <link rel="preconnect" href="https://api.botjao.com" crossorigin>

    <!-- Fonts self-hosted via @fontsource (imported in src/main.tsx) -->
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;background:#f9fafb;font-family:Inter,'Noto Sans Thai',system-ui,sans-serif;">
        <div style="height:56px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 24px;">
          <div style="height:24px;width:140px;background:#e5e7eb;border-radius:4px;"></div>
        </div>
        <div style="flex:1;padding:24px;max-width:1280px;margin:0 auto;width:100%;">
          <div style="height:28px;width:240px;background:#e5e7eb;border-radius:4px;margin-bottom:20px;"></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
            <div style="height:140px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);"></div>
            <div style="height:140px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);"></div>
            <div style="height:140px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
