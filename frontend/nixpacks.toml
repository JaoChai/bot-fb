# Nixpacks configuration for React Frontend on Railway

[phases.setup]
# Node.js 22 LTS required for Vite 7.x (needs ^20.19.0 || >=22.12.0)
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
# Express server with proper cache headers for SPA
cmd = "node server.js"
