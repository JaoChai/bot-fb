# Nixpacks configuration for React Frontend on Railway

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# Build and copy serve.json config for cache headers
cmds = ["npm run build", "cp serve.json dist/serve.json"]

[start]
# serve.json: no-cache for index.html, long cache for hashed assets
cmd = "npx serve dist -l ${PORT:-3000}"
