# Nixpacks configuration for React Frontend on Railway

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# Clear vite cache before build to ensure fresh bundle
cmds = ["rm -rf node_modules/.cache node_modules/.vite && npm run build"]

[start]
# Express server with proper cache headers for SPA
cmd = "node server.js"
