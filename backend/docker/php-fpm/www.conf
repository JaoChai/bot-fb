[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; --- Worker pool settings ---
; "dynamic" spawns/kills workers based on load
pm = dynamic

; Max simultaneous workers. Dashboard fires 6 requests at once,
; plus bot scans and webhook callbacks hit the same pool.
pm.max_children = 15

; Workers alive at startup
pm.start_servers = 4

; Keep at least this many idle
pm.min_spare_servers = 2

; Keep at most this many idle
pm.max_spare_servers = 6

; --- Protection settings ---
; Kill any request that runs longer than 30 seconds.
; Prevents a single stuck DB connection from permanently
; consuming a worker slot.
request_terminate_timeout = 30s

; Recycle each worker after 500 requests to prevent memory leaks
pm.max_requests = 500

; Log slow requests (useful for diagnosing what causes stalls)
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s
