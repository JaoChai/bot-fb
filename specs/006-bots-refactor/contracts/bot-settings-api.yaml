openapi: 3.0.3
info:
  title: Bot Settings API
  description: API endpoints for managing bot settings and configuration
  version: 1.0.0

servers:
  - url: https://api.botjao.com/api
    description: Production server

security:
  - bearerAuth: []

paths:
  /bots/{botId}/settings:
    get:
      summary: Get bot settings
      description: Returns all settings for a bot including sub-relations (limits, hitl, aggregation, response_hours)
      operationId: getBotSettings
      tags:
        - Bot Settings
      parameters:
        - $ref: '#/components/parameters/BotId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BotSettings'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update bot settings
      description: Updates bot settings. Can update core settings and sub-relations in one request.
      operationId: updateBotSettings
      tags:
        - Bot Settings
      parameters:
        - $ref: '#/components/parameters/BotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBotSettingsRequest'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BotSettings'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bots/{botId}/flows:
    get:
      summary: List flows for a bot
      description: Returns all flows associated with a bot
      operationId: listFlows
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Flow'

    post:
      summary: Create a new flow
      description: Creates a new flow for the bot
      operationId: createFlow
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFlowRequest'
      responses:
        '201':
          description: Flow created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Flow'

  /bots/{botId}/flows/{flowId}:
    get:
      summary: Get a specific flow
      description: Returns details of a specific flow
      operationId: getFlow
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/FlowId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Flow'

    put:
      summary: Update a flow
      description: Updates flow configuration. Creates audit log entry.
      operationId: updateFlow
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/FlowId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFlowRequest'
      responses:
        '200':
          description: Flow updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Flow'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      summary: Delete a flow
      description: Deletes a flow. Cannot delete if it's the only flow or default flow.
      operationId: deleteFlow
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/FlowId'
      responses:
        '204':
          description: Flow deleted successfully
        '422':
          description: Cannot delete this flow
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /bots/{botId}/flows/{flowId}/set-default:
    post:
      summary: Set flow as default
      description: Sets this flow as the default for the bot. Uses database transaction to prevent race conditions.
      operationId: setDefaultFlow
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/FlowId'
      responses:
        '200':
          description: Flow set as default
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Flow'

  /bots/{botId}/flows/{flowId}/duplicate:
    post:
      summary: Duplicate a flow
      description: Creates a copy of the flow with a new name
      operationId: duplicateFlow
      tags:
        - Flows
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/FlowId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name for the duplicated flow (optional, defaults to "Copy of {original}")
      responses:
        '201':
          description: Flow duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Flow'

  /bots/{botId}/admins:
    get:
      summary: List bot admins
      description: Returns all admins assigned to this bot with their active conversation counts (eager loaded)
      operationId: listAdmins
      tags:
        - Admins
      parameters:
        - $ref: '#/components/parameters/BotId'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminAssignment'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

    post:
      summary: Add an admin
      description: Assigns a user as admin to this bot
      operationId: addAdmin
      tags:
        - Admins
      parameters:
        - $ref: '#/components/parameters/BotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Admin added successfully

  /bots/{botId}/admins/{userId}:
    delete:
      summary: Remove an admin
      description: Removes admin access for a user
      operationId: removeAdmin
      tags:
        - Admins
      parameters:
        - $ref: '#/components/parameters/BotId'
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Admin removed successfully

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BotId:
      name: botId
      in: path
      required: true
      description: The bot ID
      schema:
        type: integer
        format: int64

    FlowId:
      name: flowId
      in: path
      required: true
      description: The flow ID
      schema:
        type: integer
        format: int64

  schemas:
    BotSettings:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bot_id:
          type: integer
          format: int64
        welcome_message:
          type: string
          nullable: true
        fallback_message:
          type: string
          nullable: true
        typing_indicator:
          type: boolean
          default: true
        typing_delay_ms:
          type: integer
          default: 1000
        language:
          type: string
          default: th
        response_style:
          type: string
          nullable: true
        auto_archive_days:
          type: integer
          nullable: true
        save_conversations:
          type: boolean
          default: true
        limits:
          $ref: '#/components/schemas/BotLimits'
        hitl_settings:
          $ref: '#/components/schemas/BotHITLSettings'
        aggregation_settings:
          $ref: '#/components/schemas/BotAggregationSettings'
        response_hours:
          $ref: '#/components/schemas/BotResponseHours'

    BotLimits:
      type: object
      properties:
        id:
          type: integer
          format: int64
        daily_message_limit:
          type: integer
          nullable: true
        per_user_limit:
          type: integer
          nullable: true
        rate_limit_per_minute:
          type: integer
          default: 60
        max_tokens_per_response:
          type: integer
          nullable: true
        rate_limit_bot_message:
          type: string
          nullable: true
        rate_limit_user_message:
          type: string
          nullable: true

    BotHITLSettings:
      type: object
      properties:
        id:
          type: integer
          format: int64
        hitl_enabled:
          type: boolean
          default: false
        hitl_triggers:
          type: array
          items:
            type: string
          nullable: true
        lead_recovery_enabled:
          type: boolean
          default: false
        reply_when_called_enabled:
          type: boolean
          default: false
        easy_slip_enabled:
          type: boolean
          default: false

    BotAggregationSettings:
      type: object
      properties:
        id:
          type: integer
          format: int64
        multiple_bubbles_enabled:
          type: boolean
          default: false
        multiple_bubbles_min:
          type: integer
          default: 2
        multiple_bubbles_max:
          type: integer
          default: 5
        multiple_bubbles_delimiter:
          type: string
          default: '\n\n'
        wait_multiple_bubbles_enabled:
          type: boolean
          default: false
        wait_multiple_bubbles_ms:
          type: integer
          default: 3000
        smart_aggregation_enabled:
          type: boolean
          default: false
        smart_min_wait_ms:
          type: integer
          default: 1000
        smart_max_wait_ms:
          type: integer
          default: 5000
        smart_early_trigger_enabled:
          type: boolean
          default: false
        smart_per_user_learning_enabled:
          type: boolean
          default: false

    BotResponseHours:
      type: object
      properties:
        id:
          type: integer
          format: int64
        response_hours_enabled:
          type: boolean
          default: false
        response_hours:
          type: object
          description: Day-based schedule configuration
          nullable: true
        response_hours_timezone:
          type: string
          default: Asia/Bangkok
        offline_message:
          type: string
          nullable: true
        reply_sticker_enabled:
          type: boolean
          default: false
        reply_sticker_message:
          type: string
          nullable: true

    UpdateBotSettingsRequest:
      type: object
      properties:
        welcome_message:
          type: string
          nullable: true
        fallback_message:
          type: string
          nullable: true
        typing_indicator:
          type: boolean
        typing_delay_ms:
          type: integer
          minimum: 0
          maximum: 5000
        language:
          type: string
        response_style:
          type: string
          nullable: true
        limits:
          type: object
          properties:
            daily_message_limit:
              type: integer
              nullable: true
            per_user_limit:
              type: integer
              nullable: true
            rate_limit_per_minute:
              type: integer
              minimum: 1
              maximum: 1000
        hitl_settings:
          type: object
          properties:
            hitl_enabled:
              type: boolean
            hitl_triggers:
              type: array
              items:
                type: string
        aggregation_settings:
          type: object
          properties:
            smart_aggregation_enabled:
              type: boolean
            smart_min_wait_ms:
              type: integer
              minimum: 100
              maximum: 10000
            smart_max_wait_ms:
              type: integer
              minimum: 100
              maximum: 30000
        response_hours:
          type: object
          properties:
            response_hours_enabled:
              type: boolean
            response_hours_timezone:
              type: string
            offline_message:
              type: string
              nullable: true

    Flow:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bot_id:
          type: integer
          format: int64
        name:
          type: string
        is_default:
          type: boolean
        system_prompt:
          type: string
          nullable: true
        agentic_mode_enabled:
          type: boolean
          default: false
        hitl_enabled:
          type: boolean
          default: false
        second_ai_enabled:
          type: boolean
          default: false
        knowledge_bases:
          type: array
          items:
            $ref: '#/components/schemas/FlowKnowledgeBase'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FlowKnowledgeBase:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        kb_top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        kb_similarity_threshold:
          type: number
          format: float
          minimum: 0.1
          maximum: 1.0
          default: 0.7

    CreateFlowRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        system_prompt:
          type: string
          nullable: true
        is_default:
          type: boolean
          default: false

    UpdateFlowRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        system_prompt:
          type: string
          nullable: true
        agentic_mode_enabled:
          type: boolean
        hitl_enabled:
          type: boolean
        second_ai_enabled:
          type: boolean
        knowledge_bases:
          type: array
          items:
            type: object
            required:
              - knowledge_base_id
            properties:
              knowledge_base_id:
                type: integer
                format: int64
              kb_top_k:
                type: integer
                minimum: 1
                maximum: 20
              kb_similarity_threshold:
                type: number
                format: float
                minimum: 0.1
                maximum: 1.0

    AdminAssignment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserSummary'
        active_conversations_count:
          type: integer
          description: Number of active conversations for this admin (eager loaded)
        created_at:
          type: string
          format: date-time

    UserSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
