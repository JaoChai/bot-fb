openapi: 3.0.3
info:
  title: Lead Recovery API
  description: API endpoints for Lead Recovery feature
  version: 1.0.0

paths:
  /api/bots/{botId}/settings:
    patch:
      summary: Update bot settings including Lead Recovery
      description: |
        Updates bot settings. Lead Recovery settings are stored in the HITL settings sub-object.
        This is the existing endpoint, extended to include lead recovery fields.
      tags:
        - Bot Settings
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hitl_settings:
                  $ref: '#/components/schemas/HITLSettingsInput'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotSettingsResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/bots/{botId}/lead-recovery/stats:
    get:
      summary: Get Lead Recovery statistics
      description: Returns analytics data for lead recovery performance
      tags:
        - Lead Recovery Analytics
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
        - name: period
          in: query
          description: Time period for statistics
          schema:
            type: string
            enum: [day, week, month]
            default: week
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadRecoveryStats'

  /api/bots/{botId}/lead-recovery/logs:
    get:
      summary: Get Lead Recovery logs
      description: Returns paginated list of follow-up attempts
      tags:
        - Lead Recovery Analytics
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Logs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadRecoveryLogsResponse'

components:
  schemas:
    HITLSettingsInput:
      type: object
      properties:
        hitl_enabled:
          type: boolean
        hitl_triggers:
          type: array
          items:
            type: string
        lead_recovery_enabled:
          type: boolean
          description: Enable/disable lead recovery
        lead_recovery_timeout_hours:
          type: integer
          minimum: 1
          maximum: 72
          default: 4
          description: Hours of inactivity before sending follow-up
        lead_recovery_mode:
          type: string
          enum: [static, ai]
          default: static
          description: Message generation mode
        lead_recovery_message:
          type: string
          maxLength: 1000
          nullable: true
          description: Custom message for static mode
        lead_recovery_max_attempts:
          type: integer
          minimum: 1
          maximum: 5
          default: 2
          description: Maximum follow-up attempts per conversation

    BotSettingsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
            bot_id:
              type: integer
            hitl_settings:
              $ref: '#/components/schemas/HITLSettings'

    HITLSettings:
      type: object
      properties:
        hitl_enabled:
          type: boolean
        hitl_triggers:
          type: array
          items:
            type: string
        lead_recovery_enabled:
          type: boolean
        lead_recovery_timeout_hours:
          type: integer
        lead_recovery_mode:
          type: string
          enum: [static, ai]
        lead_recovery_message:
          type: string
          nullable: true
        lead_recovery_max_attempts:
          type: integer

    LeadRecoveryStats:
      type: object
      properties:
        data:
          type: object
          properties:
            period:
              type: string
            total_sent:
              type: integer
              description: Total follow-ups sent
            total_responded:
              type: integer
              description: Total customer responses
            response_rate:
              type: number
              format: float
              description: Response rate percentage
            by_mode:
              type: object
              properties:
                static:
                  type: object
                  properties:
                    sent:
                      type: integer
                    responded:
                      type: integer
                ai:
                  type: object
                  properties:
                    sent:
                      type: integer
                    responded:
                      type: integer
            daily_breakdown:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  sent:
                    type: integer
                  responded:
                    type: integer

    LeadRecoveryLogsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LeadRecoveryLog'
        meta:
          type: object
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer

    LeadRecoveryLog:
      type: object
      properties:
        id:
          type: integer
        conversation_id:
          type: integer
        attempt_number:
          type: integer
        message_mode:
          type: string
          enum: [static, ai]
        message_sent:
          type: string
        sent_at:
          type: string
          format: date-time
        delivery_status:
          type: string
          enum: [sent, failed, blocked]
        customer_responded:
          type: boolean
        responded_at:
          type: string
          format: date-time
          nullable: true
        customer:
          type: object
          nullable: true
          properties:
            name:
              type: string
            external_id:
              type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
