openapi: 3.0.3
info:
  title: Chat Page API
  description: |
    API contracts for Chat Page refactor.
    **Note**: These are EXISTING endpoints - no new endpoints are added.
    This document serves as reference for the service layer implementation.
  version: 1.0.0

servers:
  - url: https://api.botjao.com/api/v1
    description: Production
  - url: http://localhost:8000/api/v1
    description: Development

tags:
  - name: Conversations
    description: Conversation management
  - name: Messages
    description: Message operations
  - name: Notes
    description: Admin notes on conversations
  - name: Tags
    description: Conversation tagging

paths:
  /bots/{botId}/conversations:
    get:
      tags: [Conversations]
      summary: List conversations for a bot
      operationId: listConversations
      parameters:
        - $ref: '#/components/parameters/BotId'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, closed, handover]
        - name: channel_type
          in: query
          schema:
            type: string
            enum: [line, telegram, facebook]
        - name: telegram_chat_type
          in: query
          schema:
            type: string
            enum: [private, group, supergroup, channel]
        - name: is_handover
          in: query
          schema:
            type: boolean
        - name: assigned_user_id
          in: query
          schema:
            type: integer
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tag list
        - name: search
          in: query
          schema:
            type: string
          description: Search by customer name or external ID
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [last_message_at, created_at, message_count, status]
            default: last_message_at
        - name: sort_direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ConversationListItem'
                      meta:
                        type: object
                        properties:
                          status_counts:
                            $ref: '#/components/schemas/StatusCounts'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /bots/{botId}/conversations/{conversationId}:
    get:
      tags: [Conversations]
      summary: Get conversation with messages
      operationId: getConversation
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
        - name: messages_limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Conversation with messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ConversationDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Conversations]
      summary: Update conversation
      operationId: updateConversation
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationUpdateRequest'
      responses:
        '200':
          description: Updated conversation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ConversationDetail'

  /bots/{botId}/conversations/{conversationId}/handover:
    post:
      tags: [Conversations]
      summary: Toggle handover mode
      operationId: toggleHandover
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_handover:
                  type: boolean
                auto_enable_minutes:
                  type: integer
                  description: Minutes until bot auto-enables (optional)
      responses:
        '200':
          description: Handover toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ConversationDetail'

  /bots/{botId}/conversations/{conversationId}/messages:
    get:
      tags: [Messages]
      summary: Get messages for conversation (paginated)
      operationId: listMessages
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
        - name: before_id
          in: query
          schema:
            type: integer
          description: Get messages before this ID (cursor pagination)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  meta:
                    type: object
                    properties:
                      has_more:
                        type: boolean

    post:
      tags: [Messages]
      summary: Send a message
      operationId: sendMessage
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Message'
        '422':
          $ref: '#/components/responses/ValidationError'

  /bots/{botId}/conversations/{conversationId}/messages/{messageId}/read:
    post:
      tags: [Messages]
      summary: Mark message as read
      operationId: markMessageRead
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Message marked as read

  /bots/{botId}/conversations/{conversationId}/notes:
    get:
      tags: [Notes]
      summary: Get admin notes
      operationId: getNotes
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Notes array
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'

    post:
      tags: [Notes]
      summary: Add a note
      operationId: addNote
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '201':
          description: Note added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Note'

  /bots/{botId}/conversations/{conversationId}/tags:
    put:
      tags: [Tags]
      summary: Update conversation tags
      operationId: updateTags
      parameters:
        - $ref: '#/components/parameters/BotId'
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tags]
              properties:
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Tags updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ConversationDetail'

components:
  parameters:
    BotId:
      name: botId
      in: path
      required: true
      schema:
        type: integer
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    ConversationListItem:
      type: object
      properties:
        id:
          type: integer
        channel_type:
          type: string
        status:
          type: string
        is_handover:
          type: boolean
        unread_count:
          type: integer
        last_message_at:
          type: string
          format: date-time
        customer:
          $ref: '#/components/schemas/CustomerProfileSummary'
        last_message:
          $ref: '#/components/schemas/MessageSummary'

    ConversationDetail:
      allOf:
        - $ref: '#/components/schemas/ConversationListItem'
        - type: object
          properties:
            tags:
              type: array
              items:
                type: string
            memory_notes:
              type: array
              items:
                $ref: '#/components/schemas/Note'
            assigned_user:
              $ref: '#/components/schemas/UserSummary'
            bot_auto_enable_at:
              type: string
              format: date-time
              nullable: true
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'

    ConversationUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, closed]
        assigned_user_id:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string

    Message:
      type: object
      properties:
        id:
          type: integer
        sender:
          type: string
          enum: [user, bot, agent]
        content:
          type: string
        type:
          type: string
          enum: [text, image, sticker, video, audio, file, location]
        media_url:
          type: string
          nullable: true
        media_type:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    MessageSummary:
      type: object
      properties:
        content:
          type: string
        sender:
          type: string
        created_at:
          type: string
          format: date-time

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        type:
          type: string
          enum: [text, image]
          default: text
        media_url:
          type: string

    CustomerProfileSummary:
      type: object
      properties:
        id:
          type: integer
        display_name:
          type: string
        picture_url:
          type: string
          nullable: true
        channel_type:
          type: string

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Note:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        created_by:
          $ref: '#/components/schemas/UserSummary'
        created_at:
          type: string
          format: date-time

    StatusCounts:
      type: object
      properties:
        active:
          type: integer
        closed:
          type: integer
        handover:
          type: integer
        total:
          type: integer
        needs_response:
          type: integer
        waiting_customer:
          type: integer

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
        links:
          type: object
          properties:
            first:
              type: string
            last:
              type: string
            prev:
              type: string
              nullable: true
            next:
              type: string
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Unauthenticated.
    Forbidden:
      description: Not authorized to access this resource
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: This action is unauthorized.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Resource not found.
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
